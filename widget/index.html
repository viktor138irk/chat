<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WSChat Widget Test</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #26324f, #111827 58%, #070b12);
        color: #ffffff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, calc(100vw - 32px));
        padding: 36px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 5vw, 58px);
        line-height: 1;
      }

      p {
        margin: 0;
        max-width: 620px;
        color: rgba(255, 255, 255, 0.74);
        font-size: 18px;
        line-height: 1.6;
      }

      .hint {
        margin-top: 22px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.86);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>WSChat</h1>
      <p>Тестовая страница виджета StackWorks. Нажмите кнопку чата в правом нижнем углу, отправьте сообщение, затем ответьте на него в Telegram reply-сообщением.</p>
      <div class="hint">Кнопка чата находится справа снизу</div>
    </main>

    <script
      src="/src/widget.js"
      data-site-id="site_default"
      data-api-url="https://api.stackworks.ru"
      data-ws-url="wss://api.stackworks.ru"
    ></script>
  </body>
</html>
